# Example yggsync configuration.
# yggsync is now a native sync engine; it no longer shells out to rclone.

lock_file = "~/.local/state/yggsync.lock"
worktree_state_dir = "~/.local/state/yggsync/worktrees"

[[targets]]
name = "nas"
type = "smb"
host = "nas.lan"
share = "data"
username = "alice"
password_env = "SAMBA_PASSWORD"

[[jobs]]
name = "notes"
description = "Single-user Obsidian worktree against a central SMB repository"
type = "worktree"
local = "~/Documents/notes"
remote = "nas:users/alice/notes"
timeout_seconds = 900
filter_rules = [
  "- **/.obsidian/**",
  "- **/.trash/**",
  "- **/*.conflict*",
  "- [A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_]~[A-Za-z0-9].*",
  "- **/[A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_][A-Za-z0-9_]~[A-Za-z0-9].*",
]

[[jobs]]
name = "chat-backups"
description = "Push chat export archives to SMB storage"
type = "copy"
local = "~/Backups/chat"
remote = "nas:users/alice/chat-backups"
timeout_seconds = 600

[[jobs]]
name = "camera-roll"
description = "Upload camera media first, then prune old locals after remote confirmation"
type = "retained_copy"
local = "~/Pictures/Camera"
remote = "nas:users/alice/media/camera-roll"
timeout_seconds = 1800
local_retention_days = 30

[[jobs]]
name = "screenshots"
description = "Offload screenshots and keep the device lean"
type = "retained_copy"
local = "~/Pictures/Screenshots"
remote = "nas:users/alice/media/screenshots"
timeout_seconds = 900
local_retention_days = 30

[[jobs]]
name = "downloads-archive"
description = "Archive only the download artifacts worth keeping"
type = "copy"
local = "~/Downloads"
remote = "nas:users/alice/downloads"
timeout_seconds = 900
include = [
  "session-buddy-export-*",
  "receipts/**",
  "exports/**",
]
exclude = ["*"]
[[jobs.keep_latest]]
glob = "session-buddy-export-*"
keep = 1
