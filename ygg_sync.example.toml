# Example yggsync configuration.
# Copy to ~/.config/ygg_sync.toml and adjust remotes, paths, and retention.

rclone_binary = "rclone"
rclone_config = "~/.config/rclone/rclone.conf"
default_flags = ["--fast-list", "--use-json-log", "--stats=30s", "--transfers=4"]

[[jobs]]
name   = "notes"
type   = "bisync"
local  = "~/Documents/notes"
remote = "nas:users/alice/notes"
resync_on_exit = [7]
resync_flags   = ["--resync"]
exclude = ["**/.obsidian/**", "**/.trash/**"]

[[jobs]]
name   = "chat-backups"
type   = "copy"
local  = "~/Backups/chat"
remote = "nas:users/alice/chat-backups"
flags  = ["--create-empty-src-dirs"]

[[jobs]]
name   = "camera-roll"
type   = "retained_copy"
local  = "~/Pictures/Camera"
remote = "nas:users/alice/media/camera-roll"
local_retention_days = 30
flags  = ["--create-empty-src-dirs"]

[[jobs]]
name   = "screenshots"
type   = "retained_copy"
local  = "~/Pictures/Screenshots"
remote = "nas:users/alice/media/screenshots"
local_retention_days = 30

[[jobs]]
name   = "downloads-archive"
type   = "copy"
local  = "~/Downloads"
remote = "nas:users/alice/downloads"
include = [
  "session-buddy-export-*",
  "receipts/**",
  "exports/**",
]
exclude = ["*"]
flags   = ["--create-empty-src-dirs"]
[[jobs.keep_latest]]
glob = "session-buddy-export-*"
keep = 1

[[jobs]]
name   = "home-config"
type   = "copy"
local  = "~/.config"
remote = "nas:users/alice/workstation/config"
flags  = ["--create-empty-src-dirs"]
